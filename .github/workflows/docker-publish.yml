name: Publish Docker image

# Builds the image and pushes it to GitHub Container Registry
# (ghcr.io/<owner>/sendoff). No secrets to configure: the built-in GITHUB_TOKEN
# can push to the repo's own GHCR namespace.
#
# Tags produced:
#   - latest            (on the default branch)
#   - <branch>          (on any branch push)
#   - <version>         (on a git tag like v0.1.0 -> 0.1.0, plus 0.1)
#   - sha-<short-sha>   (always, for exact pinning)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # wanker (the homelab host) is x86_64; add linux/arm64 here if you
          # ever deploy to a Pi/ARM box.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
